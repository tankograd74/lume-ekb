name: Update prices from Yandex Maps

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-prices
  cancel-in-progress: true

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape and generate prices
        env:
          YANDEX_ORG_URL: ${{ vars.YANDEX_ORG_URL }}
        run: bash scripts/update_prices.sh

      - name: Commit if changed
        run: |
          if git diff --quiet -- data src/data/prices.ts src/data/prices.json public/data/prices.json; then
            echo "No price changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data src/data/prices.ts src/data/prices.json public/data/prices.json
          git commit -m "chore: refresh prices from Yandex Maps"
          git push
