name: Sync Yandex prices

on:
  schedule:
    # Every 3 hours (UTC)
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sync-prices
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync prices from Yandex Maps
        env:
          YANDEX_PRICES_URL: https://yandex.ru/maps/org/lum_/83014772904/prices/
        run: python3 scripts/sync_yandex_prices.py

      - name: Detect changes
        id: detect
        run: |
          if git diff --quiet -- src/data/prices.json public/data/prices.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Prices unchanged"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Prices changed"
          fi

      - name: Commit updated prices
        if: steps.detect.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/prices.json public/data/prices.json
          git commit -m "Sync service prices from Yandex Maps"
          git push

      - name: Setup Node
        if: steps.detect.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build site
        if: steps.detect.outputs.changed == 'true'
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        if: steps.detect.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.detect.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
